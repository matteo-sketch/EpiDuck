<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>EpiDuck</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
  body {
    font-family: sans-serif;
    font-size: 13px;
    padding: 14px;
    width: 280px;
    color: #222;
  }
  h2 {
    font-size: 14px;
    color: #CB2376;
    margin: 0 0 12px 0;
    border-bottom: 2px solid #CB2376;
    padding-bottom: 6px;
  }
  label {
    display: block;
    font-weight: bold;
    margin-bottom: 3px;
    margin-top: 10px;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 7px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
  }
  .hint {
    font-size: 10px;
    color: #888;
    margin-top: 3px;
  }
  button {
    margin-top: 14px;
    width: 100%;
    background: #CB2376;
    color: white;
    border: none;
    padding: 9px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
  }
  button:hover { background: #a81c60; }
  #status {
    margin-top: 8px;
    font-size: 11px;
    text-align: center;
    min-height: 16px;
    color: #2ecc71;
  }
  #version {
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-size: 9px;
    color: #aaa;
    font-family: monospace;
  }
  body { position: relative; padding-bottom: 22px; }
</style>
</head>
<body>
<h2><img src="icon.svg" width="20" height="20" style="vertical-align:middle;margin-right:6px;">EpiDuck</h2>

<div id="enabled-row" style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f8f4ff;border:1px solid #e0d5f5;border-radius:6px;margin-bottom:14px;">
  <button id="power-btn" title="Accendi/spegni globalmente" aria-label="Toggle EpiDuck on/off" style="width:48px;height:48px;flex-shrink:0;border-radius:50%;border:2px solid #ccc;background:#f3f4f6;color:#9ca3af;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;margin:0;transition:all .15s;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
      <line x1="12" y1="2" x2="12" y2="12"/>
    </svg>
  </button>
  <div style="flex:1;">
    <div style="font-weight:bold;font-size:13px;color:#222;">EpiDuck</div>
    <div id="enabled-state" style="font-size:11px;color:#888;">—</div>
  </div>
  <input type="checkbox" id="enabled-toggle" style="display:none;">
</div>
<style>
  #power-btn.is-on { background: #ecfdf5; border-color: #10b981; color: #10b981; box-shadow: 0 0 0 4px rgba(16,185,129,0.12); }
  #power-btn.is-off { background: #fef2f2; border-color: #ef4444; color: #ef4444; }
  #power-btn:hover { transform: scale(1.05); }
  #power-btn:active { transform: scale(0.95); }
</style>

<label for="notion-key">Notion API Key</label>
<input type="password" id="notion-key" placeholder="secret_xxxxxxxxxxxxxxxx">
<div class="hint">Integration token da notion.so/my-integrations</div>

<label for="notion-page">Page ID parent (per Estrai corso)</label>
<input type="text" id="notion-page" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
<div class="hint">ID della pagina Notion sotto cui creare i corsi estratti (32 hex dall'URL)</div>

<label for="anthropic-key">Anthropic API Key (opzionale, per AI rework)</label>
<input type="password" id="anthropic-key" placeholder="sk-ant-xxxxxxxxxxxxxxxx">
<div class="hint">Da console.anthropic.com — usata con Sonnet 4.6 per ottimizzare i riassunti</div>

<button id="save-btn">Salva impostazioni</button>
<div id="status"></div>

<div id="version"></div>
<script src="popup.js"></script>
</body>
</html>
